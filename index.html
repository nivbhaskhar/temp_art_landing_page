<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noai, noimageai">
    <meta name="robots" content="noimageindex">
    <title>Niv Bhaskhar | Art Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #888888;
            /* We set a variable for the collage width to keep everything aligned */
            --content-width: 578px; 
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Centered Container for everything */
        .container {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 1.2rem;
            font-size: 1.2rem; /* Larger for icons */
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Main Image */
        .hero-section {
            margin-bottom: 3rem;
            line-height: 0; /* Removes weird bottom gap in some browsers */
        }

        .main-collage {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        /* Artist Bio Section - Now strictly aligned to the image width */
        .bio-section {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .artist-photo {
            width: 120px; /* Smaller, elegant size */
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0; /* Prevents image from squishing */
            border: 1px solid #f0f0f0;
        }

        .blurb-text {
            font-size: 0.95rem;
            color: #333;
            margin: 0;
        }

        /* Construction Notice */
        .status-notice {
            font-size: 0.75rem;
            color: var(--accent-color);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem; /* Reduced from 1.5rem */
        }

        footer {
            border-top: 1px solid #f0f0f0;
            padding: 1.5rem 0; /* Reduced from 2rem */
            text-align: center;
            margin-top: 1rem; /* Reduced from 2rem */
        }

        .email-link {
            display: block;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.75rem; /* Reduced from 1.5rem */
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 1.2rem; /* Slightly tighter gap */
        }

        .footer-socials a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1.1rem; /* Slightly smaller icons to match text */
        }

        /* Mobile specific tweaks */
        @media (max-width: 480px) {
            .bio-section {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Niv Bhaskhar</h1>
            <nav>
                <a href="https://pinterest.com/nivbhaskhar" target="_blank" title="Pinterest">
                    <i class="fa-brands fa-pinterest"></i>
                </a>
                <a href="https://instagram.com/nivbhaskhar" target="_blank" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </nav>
        </header>

        <main>
            <section class="hero-section">
                <img src="assets/nivbhaskhar-portfolio-collage.jpg" alt="Featured Work" class="main-collage">
            </section>

            <section class="bio-section">
                <img src="assets/artist_photo.jpeg" alt="Artist Portrait" class="artist-photo">
                <div class="blurb-text">
                    <p> Hello there! I am Niv Bhaskhar (ideallaedi). I work in multiple mediums including gouache, oil pastel, acrylic, and charcoal. This is a curated glimpse into my portfolio. More soon ...
                </div>
            </section>
        </main>

    <footer>
        <p class="status-notice">Site under construction</p>
        
        <a href="mailto:art@nivbhaskhar.com" class="email-link">Inquiries: art@nivbhaskhar.com</a>

        <div class="footer-socials">
            <a href="https://pinterest.com/nivbhaskhar" target="_blank"><i class="fa-brands fa-pinterest"></i></a>
            <a href="https://instagram.com/nivbhaskhar" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </footer>
    </div>

</body>
</html>
